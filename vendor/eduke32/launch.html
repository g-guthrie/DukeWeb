<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Duke Browser Build</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07090d;
        --panel: rgba(10, 14, 20, 0.9);
        --panel-border: rgba(234, 189, 103, 0.22);
        --ink: #f3e6bf;
        --accent: #f1a255;
        --muted: rgba(243, 230, 191, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(241, 162, 85, 0.18), transparent 26%),
          linear-gradient(180deg, #090d12 0%, #030407 100%);
        color: var(--ink);
        font: 15px/1.4 Georgia, serif;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }

      #canvas-wrap {
        position: relative;
        width: min(calc(100vw - 24px), calc((100vh - 24px) * 4 / 3));
        height: min(calc(100vh - 24px), calc((100vw - 24px) * 3 / 4));
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
        background: #000;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      }

      #canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        background: #000;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        outline: none;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 2;
        pointer-events: none;
      }

      #status-panel {
        pointer-events: auto;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 10px 12px;
        backdrop-filter: blur(8px);
        min-width: min(420px, 55vw);
      }

      #status-kicker {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      #status {
        margin: 0;
      }

      #progress {
        width: 100%;
        margin-top: 8px;
      }

      #fullscreen-button {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 3;
        pointer-events: auto;
        border: 1px solid rgba(241, 162, 85, 0.35);
        border-radius: 999px;
        background: rgba(12, 16, 24, 0.82);
        color: var(--ink);
        font: 11px/1 Georgia, serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 10px 12px;
        min-width: 0;
        cursor: pointer;
        backdrop-filter: blur(8px);
      }

      #fullscreen-button:hover {
        background: rgba(24, 31, 45, 0.92);
      }

      #fullscreen-button:focus-visible {
        outline: 2px solid rgba(241, 162, 85, 0.9);
        outline-offset: 2px;
      }

      #output {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
        z-index: 2;
        display: none;
        min-height: 140px;
        max-height: 28vh;
        background: rgba(0, 0, 0, 0.88);
        color: #d8e9ff;
        border: 1px solid rgba(216, 233, 255, 0.16);
        border-radius: 12px;
        padding: 12px;
        resize: none;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      body[data-ready="true"] #status-panel {
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      body[data-ready="true"] #progress {
        display: none;
      }

      @media (max-width: 900px) {
        #hud {
          top: 10px;
          left: 10px;
        }

        #status-panel {
          min-width: 0;
        }

        #fullscreen-button {
          top: 10px;
          right: 10px;
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div id="status-panel">
          <div id="status-kicker">EDuke32 Web Runtime</div>
          <div id="status">Booting...</div>
          <progress id="progress" hidden max="100" value="0"></progress>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
      </div>
      <button id="fullscreen-button" type="button" aria-label="Toggle fullscreen">Full</button>

      <textarea id="output" rows="8" aria-label="Runtime log"></textarea>
    </div>

    <script>
      const statusElement = document.getElementById("status");
      const progressElement = document.getElementById("progress");
      const canvasElement = document.getElementById("canvas");
      const canvasWrapElement = document.getElementById("canvas-wrap");
      const fullscreenButton = document.getElementById("fullscreen-button");
      const outputElement = document.getElementById("output");
      let allowBrowserFullscreen = false;
      const browserOptions = { pointerLock: true };

      const blockImplicitFullscreenRequests = () => {
        const fullscreenApis = [
          [Element.prototype, "requestFullscreen"],
          [Element.prototype, "webkitRequestFullscreen"],
          [Element.prototype, "webkitRequestFullScreen"],
          [Element.prototype, "mozRequestFullScreen"],
          [Element.prototype, "msRequestFullscreen"],
        ];

        for (const [proto, methodName] of fullscreenApis) {
          const original = proto?.[methodName];
          if (typeof original !== "function" || original.__edukeWrapped) {
            continue;
          }

          const wrapped = function (...args) {
            if (!allowBrowserFullscreen) {
              return Promise.reject?.(new DOMException("Implicit fullscreen blocked", "NotAllowedError"));
            }
            return original.apply(this, args);
          };

          wrapped.__edukeWrapped = true;
          proto[methodName] = wrapped;
        }
      };

      blockImplicitFullscreenRequests();

      const params = new URLSearchParams(window.location.search);
      const autotestEnabled = params.get("autotest") === "1";
      window.__edukeAutotestConfig = {
        enabled: autotestEnabled,
        start: performance.now(),
        sampleCounter: 0,
      };

      const GAMEFUNCS = Object.freeze({
        moveForward: 0,
        moveBackward: 1,
        turnLeft: 2,
        turnRight: 3,
        strafe: 4,
        fire: 5,
        open: 6,
        run: 7,
        jump: 9,
        crouch: 10,
        strafeLeft: 15,
        strafeRight: 16,
      });

      const inputState = Object.assign(window.__edukeInput || {}, {
        injectedButtonsLow: 0,
        injectedMouseX: 0,
        injectedMouseY: 0,
        injectedButtonsObserved: 0,
      });
      window.__edukeInput = inputState;

      const syncLegacyInputGlobals = () => {
        window.__edukeInjectedButtonsLow = inputState.injectedButtonsLow;
        window.__edukeInjectedMouseX = inputState.injectedMouseX;
        window.__edukeInjectedMouseY = inputState.injectedMouseY;
        window.__edukeInjectedButtonsObserved = inputState.injectedButtonsObserved;
      };

      const setInjectedButtonsLow = (value) => {
        inputState.injectedButtonsLow = value | 0;
        window.__edukeInjectedButtonsLow = inputState.injectedButtonsLow;
      };

      const addInjectedMouseDelta = (dx, dy) => {
        inputState.injectedMouseX += dx | 0;
        inputState.injectedMouseY += dy | 0;
        window.__edukeInjectedMouseX = inputState.injectedMouseX;
        window.__edukeInjectedMouseY = inputState.injectedMouseY;
      };

      const clearInjectedMouseDelta = () => {
        inputState.injectedMouseX = 0;
        inputState.injectedMouseY = 0;
        window.__edukeInjectedMouseX = 0;
        window.__edukeInjectedMouseY = 0;
      };

      syncLegacyInputGlobals();

      const buttonSources = new Map();

      const syncInjectedButtons = () => {
        let mask = 0;
        for (const [button, sources] of buttonSources) {
          if (sources.size > 0) {
            mask |= 1 << button;
          }
        }
        setInjectedButtonsLow(mask);
      };

      const setInjectedButton = (button, active, source = `api:${button}`) => {
        let sources = buttonSources.get(button);
        if (!sources) {
          sources = new Set();
          buttonSources.set(button, sources);
        }

        if (active) {
          sources.add(source);
        } else {
          sources.delete(source);
          if (sources.size === 0) {
            buttonSources.delete(button);
          }
        }

        syncInjectedButtons();
      };

      const clearInjectedInput = () => {
        buttonSources.clear();
        setInjectedButtonsLow(0);
        clearInjectedMouseDelta();
      };

      window.__edukeSetInjectedButton = setInjectedButton;
      window.__edukeClearInjectedInput = clearInjectedInput;
      window.__edukeRunActionSequence = (actions, sampleMs = 100) => {
        clearInjectedInput();
        window.__edukeSequenceSamples = [];
        let lastSampleAt = -Infinity;

        const sample = (now) => {
          const state = window.__edukeState || {};
          const entry = {
            t: now,
            x: state.x ?? 0,
            y: state.y ?? 0,
            ang: state.ang ?? 0,
            ammo: state.ammo ?? 0,
            kickback: state.kickback ?? 0,
            frameCounter: state.frameCounter ?? 0,
          };
          window.__edukeSequenceSamples.push(entry);
          if (window.__edukeSequenceSamples.length > 256) {
            window.__edukeSequenceSamples.shift();
          }
          console.log("EDUKE_SAMPLE", JSON.stringify(entry));
        };

        const maxEnd = actions.reduce((acc, action) => Math.max(acc, action.start + action.duration), 0);
        const start = performance.now();

        const tick = (now) => {
          const elapsed = now - start;
          clearInjectedInput();

          for (const [index, action] of actions.entries()) {
            if (elapsed >= action.start && elapsed < action.start + action.duration) {
              setInjectedButton(action.button, true, `autotest:${index}`);
            }
          }

          if (now - lastSampleAt >= sampleMs) {
            lastSampleAt = now;
            sample(now);
          }

          if (elapsed < maxEnd + sampleMs * 2) {
            requestAnimationFrame(tick);
          } else {
            clearInjectedInput();
            sample(now);
            console.log("EDUKE_SEQUENCE_DONE");
          }
        };

        requestAnimationFrame(tick);
      };

      const startAutotest = () => {
        if (!autotestEnabled || window.__edukeAutotestStarted) {
          return;
        }
        window.__edukeAutotestStarted = true;
        browserOptions.pointerLock = false;
        clearInjectedInput();

        const waitForState = () => {
          const state = window.__edukeState;
          if (!state || !state.frameCounter || state.gm !== 4) {
            requestAnimationFrame(waitForState);
            return;
          }

          window.__edukeAutotestConfig.start = performance.now();
          window.__edukeAutotestConfig.sampleCounter = 0;

          window.__edukeRunActionSequence(
            [
              { button: GAMEFUNCS.moveForward, start: 0, duration: 1200 },
              { button: GAMEFUNCS.turnRight, start: 1800, duration: 900 },
              { button: GAMEFUNCS.fire, start: 3200, duration: 250 },
            ],
            120,
          );

          const finish = () => {
            const samples = window.__edukeSequenceSamples || [];
            if (samples.length < 2) {
              requestAnimationFrame(finish);
              return;
            }

            const first = samples[0];
            const last = samples[samples.length - 1];
            const dx = (last.x || 0) - (first.x || 0);
            const dy = (last.y || 0) - (first.y || 0);
            const rawAng = (((last.ang || 0) - (first.ang || 0) + 1024) % 2048) - 1024;
            const movedEnough = Math.hypot(dx, dy) > 128;
            const turnedEnough = Math.abs(rawAng) > 8;
            const firedEnough = (last.ammo || 0) < (first.ammo || 0) || (last.kickback || 0) > (first.kickback || 0);

            console.log(
              "EDUKE_AUTOTEST_RESULT",
              JSON.stringify({
                first,
                last,
                sampleCount: samples.length,
                assertions: { movedEnough, turnedEnough, firedEnough },
              }),
            );
            document.body.dataset.autotest = movedEnough && turnedEnough && firedEnough ? "pass" : "fail";
          };

          setTimeout(finish, 4300);
        };

        requestAnimationFrame(waitForState);
      };

      const keyToGamefunc = new Map([
        ["ArrowUp", GAMEFUNCS.moveForward],
        ["KeyW", GAMEFUNCS.moveForward],
        ["ArrowDown", GAMEFUNCS.moveBackward],
        ["KeyS", GAMEFUNCS.moveBackward],
        ["ArrowLeft", GAMEFUNCS.turnLeft],
        ["KeyA", GAMEFUNCS.strafeLeft],
        ["ArrowRight", GAMEFUNCS.turnRight],
        ["KeyD", GAMEFUNCS.strafeRight],
        ["ShiftLeft", GAMEFUNCS.run],
        ["ShiftRight", GAMEFUNCS.run],
        ["ControlLeft", GAMEFUNCS.fire],
        ["ControlRight", GAMEFUNCS.fire],
        ["Space", GAMEFUNCS.jump],
        ["KeyC", GAMEFUNCS.crouch],
      ]);

      const focusCanvas = () => {
        canvasElement.focus({ preventScroll: true });
      };

      const resyncCanvasPresentation = () => {
        canvasElement.style.width = "100%";
        canvasElement.style.height = "100%";
        canvasElement.style.display = "block";
        requestAnimationFrame(() => {
          canvasElement.style.width = "100%";
          canvasElement.style.height = "100%";
        });
      };

      const isMenuActive = () => ((window.__edukeState?.gm || 0) & 0x1) !== 0;

      const requestPointerLockIfEnabled = () => {
        if (
          browserOptions.pointerLock &&
          !isMenuActive() &&
          document.pointerLockElement !== canvasElement &&
          typeof canvasElement.requestPointerLock === "function"
        ) {
          const result = canvasElement.requestPointerLock();
          if (result && typeof result.catch === "function") {
            result.catch(() => {});
          }
        }
      };

      const syncMouseButtons = (buttons = 0) => {
        setInjectedButton(GAMEFUNCS.fire, (buttons & 1) !== 0, "mouse:0");
        setInjectedButton(GAMEFUNCS.open, (buttons & 2) !== 0, "mouse:2");
      };

      const clearMouseButtons = () => {
        syncMouseButtons(0);
      };

      canvasElement.addEventListener("webglcontextlost", (event) => {
        event.preventDefault();
        alert("WebGL context lost. Reload the page.");
      });

      canvasElement.addEventListener("pointerdown", () => {
        focusCanvas();
      });

      canvasElement.addEventListener("mousedown", (event) => {
        if (event.button === 0) {
          if (isMenuActive()) {
            focusCanvas();
            return;
          }
          if (browserOptions.pointerLock && document.pointerLockElement !== canvasElement) {
            focusCanvas();
            requestPointerLockIfEnabled();
            event.preventDefault();
            return;
          }
          syncMouseButtons(event.buttons);
          event.preventDefault();
        } else if (event.button === 2) {
          syncMouseButtons(event.buttons);
          event.preventDefault();
        }
      });

      canvasElement.addEventListener("mouseup", (event) => {
        if (event.button === 0) {
          if (isMenuActive()) {
            return;
          }
          syncMouseButtons(event.buttons);
          event.preventDefault();
        } else if (event.button === 2) {
          syncMouseButtons(event.buttons);
          event.preventDefault();
        }
      });

      canvasElement.addEventListener("mouseleave", () => {
        if (document.pointerLockElement !== canvasElement) {
          clearInjectedMouseDelta();
        }
      });

      canvasElement.addEventListener("blur", () => {
        clearInjectedInput();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          clearInjectedInput();
        }
      });

      window.addEventListener("pagehide", () => {
        clearInjectedInput();
      });

      window.addEventListener("blur", () => {
        clearInjectedInput();
      });

      window.addEventListener("pointerup", (event) => {
        syncMouseButtons(event.buttons);
      });

      window.addEventListener("pointercancel", () => {
        clearMouseButtons();
      });

      window.addEventListener("dragend", () => {
        clearMouseButtons();
      });

      window.addEventListener("contextmenu", () => {
        clearMouseButtons();
      });

      document.addEventListener("pointerlockchange", () => {
        if (document.pointerLockElement !== canvasElement) {
          clearInjectedInput();
          resyncCanvasPresentation();
          focusCanvas();
        }
      });

      document.addEventListener("fullscreenchange", () => {
        clearInjectedInput();
        resyncCanvasPresentation();
        focusCanvas();
        if (document.fullscreenElement === canvasWrapElement) {
          requestPointerLockIfEnabled();
        }
      });

      window.addEventListener("mouseup", () => {
        clearMouseButtons();
      });

      window.addEventListener("keydown", (event) => {
        const gamefunc = keyToGamefunc.get(event.code);
        if (gamefunc !== undefined) {
          setInjectedButton(gamefunc, true, `key:${event.code}`);
          focusCanvas();
          event.preventDefault();
        }
      });

      window.addEventListener("keyup", (event) => {
        const gamefunc = keyToGamefunc.get(event.code);
        if (gamefunc !== undefined) {
          setInjectedButton(gamefunc, false, `key:${event.code}`);
          event.preventDefault();
        }
      });

      canvasElement.addEventListener("mousemove", (event) => {
        if (document.activeElement === canvasElement || document.pointerLockElement === canvasElement) {
          addInjectedMouseDelta(event.movementX || 0, event.movementY || 0);
          syncMouseButtons(event.buttons);
        }
      });

      window.addEventListener("keydown", () => {
        if (document.activeElement !== canvasElement) {
          focusCanvas();
        }
      });

      const setStatus = (text) => {
        if (!setStatus.last) {
          setStatus.last = { time: Date.now(), text: "" };
        }
        if (text === setStatus.last.text) {
          return;
        }

        const match = text && text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        const now = Date.now();
        if (match && now - setStatus.last.time < 30) {
          return;
        }

        setStatus.last = { time: now, text };
        if (match) {
          statusElement.textContent = match[1].trim();
          progressElement.hidden = false;
          progressElement.value = 100 * parseInt(match[2], 10);
          progressElement.max = 100 * parseInt(match[4], 10);
          return;
        }

        progressElement.hidden = true;
        statusElement.textContent = text || "";
      };

      const markReadyIfRunning = () => {
        if (
          window.Module?.calledRun ||
          window.Module?.ready === true ||
          document.title.includes("Duke Nukem") ||
          document.title.includes("WEB ") ||
          document.title.includes("HOLLYWOOD HOLOCAUST")
        ) {
          document.body.dataset.ready = "true";
          startAutotest();
        }
      };

      const titleObserver = new MutationObserver(markReadyIfRunning);
      titleObserver.observe(document.querySelector("title"), { childList: true });
      setInterval(markReadyIfRunning, 250);

      const toggleBrowserFullscreen = async () => {
        focusCanvas();
        allowBrowserFullscreen = true;
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen?.();
            return;
          }

          const request =
            canvasWrapElement.requestFullscreen?.bind(canvasWrapElement) ||
            canvasWrapElement.webkitRequestFullscreen?.bind(canvasWrapElement) ||
            canvasWrapElement.webkitRequestFullScreen?.bind(canvasWrapElement) ||
            canvasWrapElement.mozRequestFullScreen?.bind(canvasWrapElement) ||
            canvasWrapElement.msRequestFullscreen?.bind(canvasWrapElement);

          if (!request) {
            return;
          }

          const result = request();
          if (result && typeof result.catch === "function") {
            await result.catch(() => {});
          }
        } finally {
          setTimeout(() => {
            allowBrowserFullscreen = false;
          }, 0);
        }
      };

      fullscreenButton.addEventListener("click", (event) => {
        event.preventDefault();
        void toggleBrowserFullscreen();
      });

      window.addEventListener("resize", () => {
        resyncCanvasPresentation();
      });

      var Module = {
        elementPointerLock: false,
        onRuntimeInitialized() {
          Module.ready = true;
          document.body.dataset.ready = "true";
          focusCanvas();
          startAutotest();
        },
        keyboardListeningElement: canvasElement,
        print(...args) {
          console.log(...args);
          const line = args.join(" ");
          outputElement.value += `${line}\n`;
          outputElement.scrollTop = outputElement.scrollHeight;
        },
        canvas: canvasElement,
        setStatus,
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          if (left) {
            setStatus(`Preparing... (${this.totalDependencies - left}/${this.totalDependencies})`);
          } else {
            setStatus("Running...");
            document.body.dataset.ready = "true";
          }
        },
      };

      setStatus("Downloading...");
      window.onerror = (message) => {
        setStatus("Exception thrown, see JavaScript console");
        console.error("[post-exception status]", message);
      };
    </script>
    <script async src="eduke32-web.js"></script>
  </body>
</html>
